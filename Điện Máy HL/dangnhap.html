<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập - Điện Máy HL</title>
  <link rel="shortcut icon" href="img/favicon.ico" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/topnav.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/auth.css">

  <script src="js/Jquery/Jquery.min.js"></script>
  <script src="data/products.js"></script>
  <script src="js/classes.js"></script>
  <script src="js/dungchung.js"></script>
</head>

<body>
  <script>addTopNav();</script>
  <section>
    <script>addHeader();</script>

    <div class="authWrap">
      <div class="authCard">
        <div class="authLeft">
          <div class="authBrand">
            <div class="authLogo">HL</div>
            <div>
              <div class="authTitle">Đăng nhập</div>
              <div class="authSub">Truy cập tài khoản để xem đơn hàng & quản lý thông tin.</div>
            </div>
          </div>
          <div class="authList">
            <div><i class="fa fa-check-circle"></i> Lịch sử mua sắm</div>
            <div><i class="fa fa-check-circle"></i> Đổi mật khẩu</div>
            <div><i class="fa fa-check-circle"></i> Đồng bộ giỏ hàng</div>
          </div>
        </div>

        <div class="authRight">
          <!-- QUAN TRỌNG: name="username" và name="pass" đúng như JS của bạn -->
          <form class="authForm" onsubmit="return logIn(this)">
            <h2>Chào mừng bạn trở lại!</h2>

            <label>Tên đăng nhập</label>
            <div class="authInput">
              <i class="fa fa-user"></i>
              <input type="text" name="username" placeholder="vd: admin" required>
            </div>

            <label>Mật khẩu</label>
            <div class="authInput">
              <i class="fa fa-lock"></i>
              <input type="password" name="pass" placeholder="••••••••" required>
            </div>

            <div class="authRow">
              <div></div>
              <a class="authLink" href="quenmatkhau.html">Quên mật khẩu?</a>
            </div>

            <!-- type submit để form gọi onsubmit -->
            <button type="submit" class="authBtn authBtnPrimary">
              <i class="fa fa-sign-in"></i> TIẾP TỤC
            </button>

            <div class="authSep"><span>chưa có tài khoản?</span></div>

            <a class="authBtn authBtnGhost" href="dangky.html">
              <i class="fa fa-user-plus"></i> Đăng ký ngay
            </a>
          </form>
        </div>
      </div>
    </div>

    <div class="footer"><script>addFooter();</script></div>
  </section>
</body>
</html>
